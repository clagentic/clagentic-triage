<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 112" width="260" height="112">
  <defs>
    <linearGradient id="grad" gradientUnits="userSpaceOnUse" x1="0" y1="8" x2="0" y2="104">
      <stop offset="0%"   stop-color="#00CFFF"/>
      <stop offset="45%"  stop-color="#4A7FE8"/>
      <stop offset="100%" stop-color="#7B3FE4"/>
    </linearGradient>
    <linearGradient id="grad2" gradientUnits="userSpaceOnUse" x1="148" y1="16" x2="240" y2="96">
      <stop offset="0%"   stop-color="#00CFFF"/>
      <stop offset="50%"  stop-color="#4A7FE8"/>
      <stop offset="100%" stop-color="#7B3FE4"/>
    </linearGradient>
  </defs>

  <!-- C mark (outer r=44, inner r=34) centered at 56,56 -->
  <!-- OUTER r=44 -->
  <path d="M 92.04 81.24 A 44 44 0 0 1 27.72 89.71" fill="none" stroke="url(#grad)" stroke-width="7.5" stroke-linecap="round"/>
  <circle cx="92.04" cy="81.24" r="3.2" fill="url(#grad)"/>
  <path d="M 17.89 78.00 A 44 44 0 0 1 27.72 22.29" fill="none" stroke="url(#grad)" stroke-width="7.5" stroke-linecap="round"/>
  <path d="M 42.40 14.15 A 44 44 0 0 1 92.04 30.76" fill="none" stroke="url(#grad)" stroke-width="7.5" stroke-linecap="round"/>
  <circle cx="92.04" cy="30.76" r="3.2" fill="url(#grad)"/>
  <!-- INNER r=34 -->
  <path d="M 83.85 75.50 A 34 34 0 0 1 24.05 67.63" fill="none" stroke="url(#grad)" stroke-width="7.5" stroke-linecap="round"/>
  <circle cx="83.85" cy="75.50" r="3.2" fill="url(#grad)"/>
  <path d="M 22.02 54.81 A 34 34 0 0 1 51.27 22.33" fill="none" stroke="url(#grad)" stroke-width="7.5" stroke-linecap="round"/>
  <path d="M 63.07 22.74 A 34 34 0 0 1 83.85 36.50" fill="none" stroke="url(#grad)" stroke-width="7.5" stroke-linecap="round"/>
  <circle cx="83.85" cy="36.50" r="3.2" fill="url(#grad)"/>

  <!-- Colon separator -->
  <circle cx="114" cy="40" r="5" fill="url(#grad)"/>
  <circle cx="114" cy="72" r="5" fill="url(#grad)"/>

  <!-- Triage icon, icon zone x=142 y=8 w=96 h=96 (icon coords +134x, +0y) -->
  <!-- Icon frame -->
  <rect x="142" y="8" width="96" height="96" rx="8" ry="8"
        fill="none" stroke="url(#grad2)" stroke-width="4.5"/>

  <!-- Three inbound signal lines (+134x from icon) -->
  <line x1="160" y1="30" x2="186" y2="30"
        stroke="url(#grad2)" stroke-width="2" stroke-linecap="round"/>
  <line x1="160" y1="38" x2="180" y2="38"
        stroke="url(#grad2)" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <line x1="160" y1="46" x2="174" y2="46"
        stroke="url(#grad2)" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- Decision diamond: cx=56+134=190, cy=56 -->
  <path d="M 190 42 L 202 56 L 190 70 L 178 56 Z"
        fill="none" stroke="url(#grad2)" stroke-width="2.5"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Connector: signals into diamond -->
  <line x1="186" y1="30" x2="190" y2="42"
        stroke="url(#grad2)" stroke-width="2" stroke-linecap="round"/>

  <!-- Output branches (+134x) -->
  <!-- Top: approve -->
  <line x1="202" y1="56" x2="216" y2="40"
        stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="216" y1="40" x2="226" y2="40"
        stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Mid: respond -->
  <line x1="202" y1="56" x2="226" y2="56"
        stroke="url(#grad2)" stroke-width="2" stroke-linecap="round"/>

  <!-- Bottom: reject (dimmed) -->
  <line x1="202" y1="56" x2="216" y2="72"
        stroke="url(#grad2)" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <line x1="216" y1="72" x2="226" y2="72"
        stroke="url(#grad2)" stroke-width="2" stroke-linecap="round" opacity="0.45"/>

  <!-- Approve endpoint dot -->
  <circle cx="226" cy="40" r="3" fill="url(#grad2)"/>

  <!-- Respond endpoint: open circle -->
  <circle cx="226" cy="56" r="3" fill="none" stroke="url(#grad2)" stroke-width="2"/>

  <!-- Reject X -->
  <line x1="223" y1="69" x2="229" y2="75"
        stroke="url(#grad2)" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <line x1="229" y1="69" x2="223" y2="75"
        stroke="url(#grad2)" stroke-width="2" stroke-linecap="round" opacity="0.45"/>

  <!-- LLM agent dot in diamond center -->
  <circle cx="190" cy="56" r="2.5" fill="url(#grad2)"/>

</svg>
