# .crew/naomi.yaml — NAOMI per-project configuration
#
# Generated from: examples/starter-naomi.yaml (crew-manifest lr-e247)
# Schema: schemas/crew-config.schema.json
#
# What this file does:
#   - Controls whether NAOMI may autonomously merge PRs in this project
#   - Declares what pre-checks must pass before NAOMI merges
#   - Sets reviewer requirements (must PEACHES have reviewed first?)
#
# What this file does NOT do:
#   - Grant NAOMI authority (that comes from clagentic-directory merge-authority label)
#   - Change NAOMI's hard contract (AGENT.md governs that)
#   - Override the namespace guard (clagentic/* only; andy/* refused)

schema_version: 1

# merge_allowed: true — NAOMI may merge after all pre-checks pass, provided
# she holds merge-authority in clagentic-directory and PEACHES review is
# clean. AMoS itself never merges regardless of this value (lr-5b95).
merge_allowed: true

merge_requirements:
  tests_pass: true
  # ci_pass: false -- this repo has no CI by design (no .github/workflows/,
  # no .forgejo/workflows/); interim, per operator directive 2026-07-14
  # (lr-b3a052). Kept consistent with .clagentic/loadout/config.yaml's
  # merge.merge_requirements.ci_pass.
  ci_pass: false

# post_merge_steps — SUPERSEDED / INERT (lr-882af5, 2026-07-14).
#
# This repo already cut over from crew_merge.py to loadout-merge as its live
# merge path (confirmed: PRs #30, #31, #32 all merged by clagentic-merger[bot],
# "Merged via clagentic-loadout v0.1.0"). crew_merge.py:run_post_merge_steps
# no longer executes for this repo, so the post_merge_steps block below is
# DEAD CONFIG — it reads as authoritative but nothing runs it.
#
# The real source of truth for post-merge automation is now
# .clagentic/loadout/config.yaml's merge.post_merge_steps, which loadout-merge
# actually reads. That section wires the same deploy/install.sh step, but
# with on_failure: fail (not warn — see that file's comment for why the
# on_failure value was deliberately changed, not just carried over).
#
# Left in place rather than deleted pending confirmation that crew_merge.py
# is fully retired for this repo (no other flow still depends on it).
post_merge_steps:
  - cmd: "bash deploy/install.sh"
    description: "Run the idempotent installer/updater (deploy/install.sh) to sync merged main and restart the triage watch service, if deployed on this host"
    on_failure: warn
