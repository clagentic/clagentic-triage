# .crew/naomi.yaml — NAOMI per-project configuration
#
# Generated from: examples/starter-naomi.yaml (crew-manifest lr-e247)
# Schema: schemas/crew-config.schema.json
#
# What this file does:
#   - Controls whether NAOMI may autonomously merge PRs in this project
#   - Declares what pre-checks must pass before NAOMI merges
#   - Sets reviewer requirements (must PEACHES have reviewed first?)
#
# What this file does NOT do:
#   - Grant NAOMI authority (that comes from clagentic-directory merge-authority label)
#   - Change NAOMI's hard contract (AGENT.md governs that)
#   - Override the namespace guard (clagentic/* only; andy/* refused)

schema_version: 1

# merge_allowed: true — NAOMI may merge after all pre-checks pass, provided
# she holds merge-authority in clagentic-directory and PEACHES review is
# clean. AMoS itself never merges regardless of this value (lr-5b95).
merge_allowed: true

merge_requirements:
  tests_pass: true
  ci_pass: true

# post_merge_steps — run in the target repo root after a successful merge
# (crew_merge.py:run_post_merge_steps, lr-96cc). Deploys merged main by
# invoking the repo's own idempotent installer (deploy/install.sh, lr-47370c)
# in update mode. This step is host-agnostic by design: it does not SSH to
# any named machine. It assumes deploy/install.sh runs on whatever host is
# executing post_merge_steps (e.g. a runner/agent with a shell already open
# on the deploy target, or a scheduled job on the deploy host itself that
# periodically re-invokes the installer). Deploy topology — which host,
# which install dir, which git remote — is supplied entirely via
# CLAGENTIC_TRIAGE_* env vars in the environment this step runs in; see
# deploy/.env.example. No hostnames or install paths are hardcoded here.
#
# The installer is idempotent (skips reinstall/restart when the target
# revision is already installed and the service is healthy), so re-running
# it on every merge is safe even if a given host's post-merge invocation is
# a no-op because deploy already happened by another path.
#
# on_failure: warn — a deploy hiccup (e.g. the deploy host transiently
# unreachable from wherever this step executes, or systemd not present on a
# given target) must not fail an otherwise-good merge. NAOMI logs the
# warning and reports it; the merge itself already succeeded via the
# platform API.
post_merge_steps:
  - cmd: "bash deploy/install.sh"
    description: "Run the idempotent installer/updater (deploy/install.sh) to sync merged main and restart the triage watch service, if deployed on this host"
    on_failure: warn
